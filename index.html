<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vetëm për Ty! 🐼✨</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 90%;
            width: 400px;
            transition: all 0.3s ease;
        }
        h1 {
            color: #ff4d6d;
            margin-bottom: 20px;
            font-size: 24px;
        }
        p {
            color: #4a4a4a;
            font-size: 18px;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        button {
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
        }
        .btn-yes {
            background-color: #ff4d6d;
            color: white;
        }
        .btn-no {
            background-color: #adb5bd;
            color: white;
        }
        .hidden {
            display: none !important;
        }
        .panda-emoji {
            font-size: 80px;
            margin-bottom: 10px;
            display: inline-block;
            animation: bounce 1.5s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        .heart {
            color: #ff4d6d;
            font-size: 30px;
            animation: pulse 1s infinite;
            display: inline-block;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
    </style>
</head>
<body>

    <!-- Këshillë: Pasi ta testosh, mund ta ndryshosh këtë link me një këngë që i pëlqen asaj -->
    <audio id="disneyMusic" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div id="step1" class="container">
        <h1>⚠️ KUJDES!</h1>
        <p>Ky material shikohet vetëm një herë. Dëshiron ta shikosh tani?</p>
        <div class="buttons">
            <button class="btn-yes" onclick="shfaqSurprizen()">Po</button>
            <button class="btn-no" onclick="degjoPak()">Jo</button>
        </div>
    </div>

    <div id="step2" class="container hidden">
        <div class="panda-emoji">🐼</div>
        <h1>Për Motrën më të Mirë! ❤️</h1>
        <p>Ti je personi më special në botë! Faleminderit që je gjithmonë aty për mua. Kjo faqe e vazhdimisht u krijua vetëm për të të kujtuar sa shumë të dua! <br><br><span class="heart">❤️</span></p>
    </div>

    <script>
        function shfaqSurprizen() {
            // Fsheh hapin e parë dhe shfaq surprizën
            document.getElementById("step1").classList.add("hidden");
            document.getElementById("step2").classList.remove("hidden");
            
            // Aktivizimi i muzikës pas klikimit të butonit nga përdoruesi
            var audio = document.getElementById("disneyMusic");
            if (audio) {
                audio.play().catch(function(error) {
                    console.log("Muzika u bllokua nga shfletuesi: ", error);
                });
            }
        }

        function degjoPak() {
            alert("Hë de, mos bëj naze! Kliko 'Po' se ka surprizë! 😜");
        }
    </script>
</body>
</html>
